# Nightly E2E: полный прогон на нескольких браузерах (доп. к гейту e2e.yml)
# Cron срабатывает только на ветке по умолчанию (main) после merge workflow.
name: e2e-nightly

on:
  schedule:
    # 03:00 UTC ежедневно ≈ 06:00 МСК
    - cron: '0 3 * * *'
  workflow_dispatch:

concurrency:
  group: e2e-nightly-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright ${{ matrix.browser }}
    runs-on: ubuntu-latest
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        browser: [chromium, firefox, webkit]

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            backend/package-lock.json
            frontend/package-lock.json
            e2e/package-lock.json

      - name: Create backend/.env for CI
        run: |
          set -euo pipefail
          JWT="$(openssl rand -hex 32)"
          ADMIN="CiAdmin!$(openssl rand -hex 10)"
          MECH="CiMech!$(openssl rand -hex 10)"
          {
            echo "PORT=5000"
            echo "DATABASE_URL=\"file:./dev.db\""
            echo "NODE_ENV=development"
            echo "JWT_SECRET=${JWT}"
            echo "SEED_ADMIN_PASSWORD=${ADMIN}"
            echo "SEED_MECHANIC_PASSWORD=${MECH}"
            echo "CORS_ORIGIN=http://127.0.0.1:5173"
            echo "DISABLE_LOGIN_RATE_LIMIT=true"
          } > backend/.env
          echo "backend/.env создан (пароли эфемерные, только для этого job)"

      - name: Install backend deps
        working-directory: backend
        run: npm ci

      - name: Prisma generate + db push
        working-directory: backend
        run: |
          npx prisma generate
          npx prisma db push --skip-generate

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci

      - name: Install e2e deps
        working-directory: e2e
        run: npm ci

      - name: Install Playwright browser
        working-directory: e2e
        run: npx playwright install --with-deps ${{ matrix.browser }}

      - name: Run Playwright (${{ matrix.browser }})
        working-directory: e2e
        env:
          CI: true
          BASE_URL: http://127.0.0.1:5173
          PLAYWRIGHT_BROWSER: ${{ matrix.browser }}
        run: npm test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v5
        with:
          name: playwright-report-nightly-${{ matrix.browser }}
          path: |
            e2e/playwright-report/
            e2e/test-results/
          retention-days: 7
